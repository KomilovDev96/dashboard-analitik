name: Deploy to Local Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env files BEFORE build
        run: |
          cp /home/ubuntu/dashboard-analitik/server/.env $GITHUB_WORKSPACE/server/.env
          cp /home/ubuntu/dashboard-analitik/client/.env $GITHUB_WORKSPACE/client/.env
          echo "VITE_API_URL from env:"
          cat $GITHUB_WORKSPACE/client/.env

      - name: Install server deps & build
        run: |
          cd $GITHUB_WORKSPACE/server
          npm install
          npm run build

      - name: Install client deps & build
        run: |
          cd $GITHUB_WORKSPACE/client
          npm install
          npm run build

      - name: Sync to deploy folder & restart PM2
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            $GITHUB_WORKSPACE/ /home/ubuntu/dashboard-analitik/

          cd /home/ubuntu/dashboard-analitik/server
          npm install --omit=dev

          pm2 reload dashboard-server || pm2 start /home/ubuntu/dashboard-analitik/ecosystem.config.js
          pm2 save

          redis-cli DEL mrp:preload:stream
          redis-cli KEYS "mrp:report:*" | xargs -r redis-cli DEL
          echo "Redis MRP cache cleared!"
          echo "Deploy complete!"
